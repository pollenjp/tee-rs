name: "Build binaries"
on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
  pull_request:
    paths:
      - .github/workflows/build-binaries.yml
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTFLAGS: "-D warnings -W unreachable-pub"
  RUSTUP_MAX_RETRIES: 10
  FETCH_DEPTH: 0 # pull in the tags for the version string
  MACOSX_DEPLOYMENT_TARGET: 13.0
  # https://blog.rust-lang.org/2022/08/01/Increasing-glibc-kernel-requirements.html
  BUILD_GLIB_VERSION: 2.17

jobs:
  dist:
    strategy:
      matrix:
        include:
          # - os: windows-latest
          #   target: x86_64-pc-windows-msvc
          #   code-target: win32-x64
          # - os: windows-latest
          #   target: i686-pc-windows-msvc
          # - os: windows-latest
          #   target: aarch64-pc-windows-msvc
          #   code-target: win32-arm64
          - os: ubuntu-20.04
            target: x86_64-unknown-linux-gnu
          # - os: ubuntu-20.04
          #   target: aarch64-unknown-linux-gnu
          # - os: ubuntu-20.04
          #   target: arm-unknown-linux-gnueabihf
          # - os: macos-13
          #   target: x86_64-apple-darwin
          # - os: macos-13
          #   target: aarch64-apple-darwin
    name: dist (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      RA_TARGET: ${{ matrix.target }}
    steps:
      - name: Prepare
        run: |
          {
            echo XDG_CONFIG_HOME="${{ runner.temp }}/.config"
            echo XDG_CACHE_HOME="${{ runner.temp }}/.cache"
            echo XDG_DATA_HOME="${{ runner.temp }}/.local/share"
            echo XDG_BIN_HOME="${{ runner.temp }}/.local/bin"
            echo CARGO_HOME="${{ runner.temp }}/.cargo"
            echo PYTHONUSERBASE="${{ runner.temp }}/.local"
          } >> "$GITHUB_ENV"
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 --retry 10 --retry-connrefused -fsSL "https://sh.rustup.rs" \
            | sh -s -- --profile minimal --default-toolchain none -y
          echo "${CARGO_HOME:-$HOME/.cargo}/bin" >> $GITHUB_PATH
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update pip
        run: pip install --user -U pip
      - name: Install ziglang
        run: pip install --user ziglang
      - name: Install Rust toolchain
        run: |
          rustup update --no-self-update stable
          rustup target add ${{ matrix.target }}
          rustup component add rust-src
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}
      - name: Debug
        run: |
          set +e
          ls -la ~/.rustup
          ls -la ~/.cargo
      - name: Dist
        run: cargo xtask dist --client-patch-version ${{ github.run_number }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: ./dist
          retention-days: 1
